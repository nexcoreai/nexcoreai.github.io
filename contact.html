<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Contact NexCore Technologies for cloud, AI, and software development consulting."/>
  <link rel="canonical" href="https://nexcoreai.github.io/contact.html"/>
  <title>Contact NexCore</title>
  <style>
    :root { --bg:#050b14; --card:#0d1d35; --border:rgba(0,200,255,0.15); --cyan:#00c8ff; --white:#e8f4ff; --muted:#78a0c2; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--white);font-family:Arial,sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:4rem 1.25rem}
    a{color:var(--cyan)} .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem}
    label{display:block;margin:.7rem 0 .3rem;color:var(--muted)} input,textarea{width:100%;padding:.7rem;border-radius:8px;border:1px solid var(--border);background:#081223;color:var(--white)}
    button{margin-top:1rem;padding:.7rem 1.2rem;background:var(--cyan);border:none;border-radius:8px;cursor:pointer}
  </style>
</head>
<body>
  <main class="wrap">
    <p><a href="/">← Back to Home</a></p>
    <h1>Contact Us</h1>
    <p style="color:#78a0c2">Tell us about your project goals and timeline.</p>
    <form class="card">
      <label for="name">Name</label><input id="name" type="text"/>
      <label for="email">Email</label><input id="email" type="email"/>
      <label for="msg">Project Details</label><textarea id="msg" rows="5"></textarea>
      <button type="button">Send Inquiry</button>
    </form>
  </main>
</body>
</html>
