<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NexCore client area login." />
  <title>Login | NexCore</title>
  <style>
    :root { --bg:#061124; --panel:#0f1f3a; --border:rgba(0,200,255,.22); --text:#ebf6ff; --muted:#8db0cc; --accent:#00c8ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top,#14335b, #061124 45%); color:var(--text); font-family:Arial,sans-serif; }
    .card { width:min(420px,92%); padding:1.4rem; border:1px solid var(--border); border-radius:14px; background:var(--panel); }
    h1 { margin:0 0 .6rem; }
    p { color:var(--muted); }
    label { display:block; margin:.8rem 0 .3rem; color:var(--muted); }
    input { width:100%; padding:.78rem; border-radius:8px; border:1px solid var(--border); background:#09162a; color:var(--text); }
    button { margin-top:1rem; width:100%; border:none; border-radius:8px; padding:.8rem; background:var(--accent); font-weight:700; cursor:pointer; }
    .hint { font-size:.88rem; margin-top:.8rem; }
    .error { color:#ff9ba8; min-height:1.2rem; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Client Login</h1>
    <p>Portfolio, careers aur contact dashboard dekhne ke liye login karein.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required placeholder="client@nexcore.in" />
      <label for="password">Password</label>
      <input id="password" type="password" required placeholder="••••••••" />
      <button type="submit">Login</button>
      <p class="error" id="errorMsg"></p>
    </form>
    <p class="hint">Demo login: <strong>client@nexcore.in</strong> / <strong>Nexcore@123</strong></p>
    <p class="hint"><a href="index.html">← Back to Home</a></p>
  </main>

  <script>
    if (localStorage.getItem('nexcoreAuth') === 'true') {
      window.location.href = 'portfolio.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (email === 'client@nexcore.in' && password === 'Nexcore@123') {
        localStorage.setItem('nexcoreAuth', 'true');
        localStorage.setItem('nexcoreUser', email);
        window.location.href = 'portfolio.html';
      } else {
        errorMsg.textContent = 'Login failed. Demo credentials use karein.';
      }
    });
  </script>
</body>
</html>
